<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sign Up | Farmly</title>
    <link href="https://fonts.googleapis.com/css2?family=Averia+Serif+Libre:wght@300;400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signup-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 50px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 {
            font-family: 'Averia Serif Libre', cursive;
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #2c3e50;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 5px;
            border: 1px solid #eef2f1;
            border-radius: 12px;
            background: #fdfdfd;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(44, 62, 80, 0.2);
        }

        button:hover {
            background: #3498db;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
        }

        .links {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #444;
        }

        .links a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #2c3e50;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <h2>Admin Sign Up</h2>
        <p>Create a new administrative account</p>
        <form id="adminSignupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit">Create Admin Account</button>
        </form>
        <div class="links">
            Already an admin? <a href="login.html">Login here</a> <br>
            <a href="../login.html" class="back-link">← Back to Portal</a>
        </div>
    </div>

    <script>
        document.getElementById("adminSignupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch("http://localhost:5000/api/admin/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok) {
                    alert("Admin Registration Successful!");
                    window.location.href = "login.html";
                } else {
                    alert(data.message || "Registration Failed");
                }
            } catch (err) {
                alert("Server Error. Ensure Backend is running.");
            }
        });
    </script>
</body>

</html>

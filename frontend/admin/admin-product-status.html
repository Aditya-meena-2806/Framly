<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Status Monitor | Farmly Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .status-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-card i {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .stat-card h4 {
            margin: 5px 0;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .stat-card p {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0;
            color: #2c3e50;
        }
        .stock-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .stock-instock { background-color: #27ae60; }
        .stock-low { background-color: #f39c12; }
        .stock-out { background-color: #e74c3c; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo"><a href="admin-dashboard.html">Farmly Admin</a></div>
            <div class="header-right">
                <a href="admin-dashboard.html" style="color:white; text-decoration:none; display:flex; align-items:center; gap:8px;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-heading">
            <h1>Product <span>Status Monitor</span></h1>
            <p>Real-time overview of platform inventory and listings status.</p>
        </div>

        <div class="status-header">
            <div class="stat-card">
                <i class="fa-solid fa-boxes-stacked" style="color: #3498db;"></i>
                <h4>Total Products</h4>
                <p id="totalCount">0</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-circle-check" style="color: #27ae60;"></i>
                <h4>Approved</h4>
                <p id="approvedCount">0</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-clock" style="color: #f39c12;"></i>
                <h4>Pending</h4>
                <p id="pendingCount">0</p>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-triangle-exclamation" style="color: #e74c3c;"></i>
                <h4>Out of Stock</h4>
                <p id="outOfStockCount">0</p>
            </div>
        </div>

        <div class="card">
            <div class="table-container">
                <table id="statusTable">
                    <thead>
                        <tr>
                            <th>Product Details</th>
                            <th>Farmer</th>
                            <th>Stock Status</th>
                            <th>Approval</th>
                            <th>Category</th>
                        </tr>
                    </thead>
                    <tbody id="statusList"></tbody>
                </table>
            </div>
            <div id="noDataMsg" class="empty-msg" style="display:none; text-align:center; padding:40px; color:#888;">
                <i class="fa-solid fa-magnifying-glass" style="font-size:3rem; margin-bottom:15px; display:block;"></i>
                No products found on the platform.
            </div>
        </div>
    </div>

    <script src="admin-history.js"></script>
</body>
</html>

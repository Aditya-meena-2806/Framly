<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Login | Farmly</title>
    <!-- Font link removed -->
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-box">
        <h2>Farmer Login</h2>
        <form id="farmerLoginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="links">
            New farmer? <a href="signup.html">Create an account</a>
            <br><br>
            <a href="../login.html">← Back to Portal</a>
        </div>
    </div>

    <script>
        document.getElementById("farmerLoginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("http://localhost:5000/api/farmer/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    alert("Login Successful");
                    localStorage.setItem("farmerId", data.farmerId);
                    window.location.href = "farmer-dashboard.html";
                } else {
                    alert(data.message || "Login Failed");
                }
            } catch (err) {
                alert("Server Error. Ensure Backend is running.");
            }
        });
    </script>
</body>

</html>

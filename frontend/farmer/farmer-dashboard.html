<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Farmer Dashboard | Farmly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="farmer-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <header>
        <div class="header-content">
            <div class="logo">
                <a href="../farmer/farmer-dashboard.html">Farmly</a>
            </div>
            <div class="header-right">
                <div class="profile-display" id="profileDisplay">
                    <div class="info-group">
                        <i class="fa-solid fa-user"></i>
                        <span id="farmer-name">N/A</span>
                    </div>
                    <div class="info-group">
                        <i class="fa-solid fa-envelope"></i>
                        <span id="farmer-email">N/A</span>
                    </div>
                    <div class="info-group">
                        <i class="fa-solid fa-phone"></i>
                        <span id="farmer-phone">N/A</span>
                    </div>
                    <div class="info-group">
                        <i class="fa-solid fa-location-dot"></i>
                        <span id="farmer-location">N/A</span>
                    </div>
                </div>
                <div id="authButton">
                    <a href="farmerLogin.html" class="login-link">Login</a>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-heading">
            <h1>Farmer <span>Dashboard</span></h1>
        </div>

        <!-- Inventory Summary Row -->
        <div class="summary-row">
            <div class="card summary-card total">
                <div class="card-icon"><i class="fa-solid fa-layer-group"></i></div>
                <div class="card-info">
                    <h4>Total Products</h4>
                    <h2 id="total-count">0</h2>
                </div>
            </div>
            <div class="card summary-card available">
                <div class="card-icon"><i class="fa-solid fa-check-circle"></i></div>
                <div class="card-info">
                    <h4>Available Items</h4>
                    <h2 id="available-count">0</h2>
                </div>
            </div>
            <div class="card summary-card out-of-stock">
                <div class="card-icon"><i class="fa-solid fa-circle-exclamation"></i></div>
                <div class="card-info">
                    <h4>Out of Stock</h4>
                    <h2 id="out-of-stock-count">0</h2>
                </div>
            </div>
        </div>

        <!-- Notifications Section -->
        <div class="card" id="notificationsCard" style="border-left: 5px solid #d32f2f; display: none;">
            <h3><i class="fa-solid fa-bell"></i> Stock Notifications</h3>
            <div id="notificationsList">
                <!-- Notifications will load here -->
            </div>
        </div>

        <!-- Add Product Section -->
        <div class="card">
            <h3>Add New Product</h3>
            <form id="addProductForm">
                <input type="text" id="productName" placeholder="Product Name" required>
                <input type="number" id="price" placeholder="Price (₹)" required>
                <input type="number" id="quantity" placeholder="Quantity" required>
                <input type="text" id="unit" placeholder="Unit (e.g. kg, pcs)" required>
                <select id="category" required
                    style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px;">
                    <option value="Vegetable">Vegetable</option>
                    <option value="Fruit">Fruit</option>
                </select>
                <label for="productImage">Product Image:</label>
                <input type="file" id="productImage" accept="image/*" required>
                <button type="submit">Add Product</button>
            </form>
        </div>

        <!-- Product List Section -->
        <div class="card">
            <h3>Your Products</h3>
            <div style="overflow-x: auto;">
                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Product</th>
                            <th>Price (₹)</th>
                            <th>Quantity</th>
                            <th>Status/Stock</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productList">
                        <!-- Products will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Restock Modal -->
    <div id="restockModal" style="display:none; position:fixed; z-index:1001; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:white; margin:15% auto; padding:20px; border-radius:10px; max-width:400px; text-align:center;">
            <h3>Restock Product</h3>
            <p id="restockProductName" style="font-weight:bold; margin-bottom: 5px;"></p>
            <p id="currentStockDisplay" style="font-size: 0.9rem; color: #666;"></p>
            <div style="margin: 20px 0;">
                <label for="newQuantity" style="display: block; margin-bottom: 8px; font-weight: 500;">Units to add:</label>
                <input type="number" id="newQuantity" placeholder="e.g. 10" style="width:80%; padding:10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="display:flex; justify-content:center; gap:10px;">
                <button id="confirmRestock" style="background:#2e7d32; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight: bold;">Confirm Restock</button>
                <button id="cancelRestock" style="background:#999; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Cancel</button>
            </div>
        </div>
    </div>
    <script src="farmer.js"></script>

</body>

</html>

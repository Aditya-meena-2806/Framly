<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | Farmly</title>
    <!-- Font link removed -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-box">
        <h2>Customer Login</h2>
        <form id="customerLoginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="links">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            <a href="../login.html">← Back to Portal</a>
        </div>
    </div>

    <script>
        document.getElementById("customerLoginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("http://localhost:5000/api/customer/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    alert("Login Successful");
                    localStorage.setItem("customerName", data.name);
                    localStorage.setItem("customerId", data.userId);
                    localStorage.setItem("customerEmail", data.email);
                    localStorage.setItem("customerPhone", data.phone);
                    window.location.href = "index.html";
                } else {
                    alert(data.message || "Login Failed");
                }
            } catch (err) {
                alert("Server Error");
            }
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="icon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>Order History - Farmly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="order-history.css">
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="order-history-container">
        <a href="index.html" class="back-link">
            Back to Store <i class="fa-solid fa-arrow-right-long"></i>
        </a>
        <h1 class="page-title">My Order History</h1>
        <div id="orders-list">
            <div class="empty-history">
                <i class="fa-solid fa-box-open"></i>
                <p>Loading your orders...</p>
            </div>
        </div>
    </div>

    <div id="trackingModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeTracking()">&times;</span>
            <h3 id="trackTitle">🚚 Order Tracking</h3>
            <div id="trackingMap"></div>
            <div id="trackInfo" style="margin-top: 15px; font-size: 0.9rem; color: #555;"></div>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="reviewModal">
        <div class="review-box">
            <h3>🌟 Rate Your Order</h3>
            <p id="reviewOrderTitle">Product Quality & Delivery</p>
            <div class="stars" id="starContainer">
                <i class="fa-solid fa-star" data-val="1"></i>
                <i class="fa-solid fa-star" data-val="2"></i>
                <i class="fa-solid fa-star" data-val="3"></i>
                <i class="fa-solid fa-star" data-val="4"></i>
                <i class="fa-solid fa-star" data-val="5"></i>
            </div>
            <textarea id="reviewComment" placeholder="Write your feedback here..."></textarea>
            <button class="submit-review-btn" onclick="submitReviewAction()">Submit Review</button>
            <p style="margin-top:15px; cursor:pointer; color:#777;" onclick="closeReview()">Maybe Later</p>
        </div>
    </div>

    <!-- footer... -->
    <div id="footer">
        <footer>
            <p>&copy; 2025 Farmly All rights reserved</p>
        </footer>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let trackMap, partnerPin, dropPin, trackInterval;

        async function trackOrder(orderId, partnerId, lat, lng) {
            document.getElementById("trackingModal").style.display = "block";
            document.getElementById("trackTitle").innerText = "🚚 Live Tracking: #" + orderId.slice(-6).toUpperCase();
            
            if (!trackMap) {
                trackMap = L.map('trackingMap').setView([lat, lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(trackMap);
            }
            
            if (dropPin) trackMap.removeLayer(dropPin);
            dropPin = L.marker([lat, lng]).addTo(trackMap).bindPopup("Your Home").openPopup();
            
            async function updatePartner() {
                try {
                    const res = await fetch(`http://localhost:5000/api/order/user/${localStorage.getItem('customerId')}`);
                    const orders = await res.json();
                    const order = orders.find(o => o._id === orderId);
                    
                    if (order && order.deliveryPartnerId) {
                        const { currentLocation, name, phone } = order.deliveryPartnerId;
                        if (partnerPin) trackMap.removeLayer(partnerPin);
                        
                        partnerPin = L.marker([currentLocation.lat, currentLocation.lng], {
                            icon: L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/71/71200.png', iconSize: [30, 30] })
                        }).addTo(trackMap).bindPopup(`${name} is on the way!`).openPopup();
                        
                        document.getElementById("trackInfo").innerHTML = `
                            <b>Delivery Partner:</b> ${name} (${phone})<br>
                            <b>Status:</b> <span style="color:#27ae60; font-weight:bold;">${order.status}</span>
                        `;
                        
                        trackMap.panTo([currentLocation.lat, currentLocation.lng]);
                    }
                } catch (err) { console.error(err); }
            }

            updatePartner();
            trackInterval = setInterval(updatePartner, 10000); // Update every 10s
        }

        function closeTracking() {
            document.getElementById("trackingModal").style.display = "none";
            clearInterval(trackInterval);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('customerId');
            const ordersList = document.getElementById('orders-list');

            if (!userId) {
                ordersList.innerHTML = `<div class="empty-history"><p>Please Login.</p></div>`;
                return;
            }

            try {
                const response = await fetch(`http://localhost:5000/api/order/user/${userId}`);
                const orders = await response.json();

                if (orders.length === 0) {
                    ordersList.innerHTML = `<div class="empty-history"><p>No orders yet.</p></div>`;
                    return;
                }

                ordersList.innerHTML = ''; 

                orders.forEach(order => {
                    const date = new Date(order.createdAt).toLocaleDateString();
                    const itemsHtml = order.items.map(item => `<div class="order-item"><span>${item.name} (${item.quantity})</span><span>₹${item.price * item.quantity}</span></div>`).join('');

                    const stages = ['Pending', 'Accepted', 'Picked Up', 'Shipped', 'Delivered'];
                    const currentIdx = stages.indexOf(order.status);
                    
                    const trackingHtml = order.status !== 'Cancelled' ? `
                        <div class="tracking-timeline">
                            ${stages.map((s, i) => `
                                <div class="step ${i <= currentIdx ? 'completed' : ''} ${i === currentIdx ? 'active' : ''}">
                                    <div class="step-icon"></div><p>${s}</p>
                                </div>`).join('')}
                        </div>
                    ` : '';

                    let reviewSection = "";
                    if (order.review && order.review.rating) {
                        reviewSection = `
                            <div style="background:#f0f9ff; padding:10px; border-radius:10px; margin-top:10px; border:1px solid #bae6fd;">
                                <div style="color:#0369a1; font-weight:700; font-size:0.8rem;">YOUR FEEDBACK</div>
                                <div style="color:#eab308;">${'★'.repeat(order.review.rating)}${'☆'.repeat(5 - order.review.rating)}</div>
                                <div style="color:#334155; font-style:italic; font-size:0.85rem;">"${order.review.comment}"</div>
                            </div>
                        `;
                    }

                    const hasLocation = order.location && order.location.lat && order.location.lng;

                    let actionBtn = "";
                    if (order.status === 'Delivered') {
                        if (order.review && order.review.rating) {
                            actionBtn = `<button class="track-btn" style="background:#0369a1;"><i class="fa-solid fa-circle-check"></i> Reviewed</button>`;
                        } else {
                            actionBtn = `<button class="track-btn" style="background:orangered;" onclick="openReviewModal('${order._id}')">Give Feedback <i class="fa-solid fa-star"></i></button>`;
                        }
                    } else if (order.deliveryPartnerId && hasLocation && order.status !== 'Cancelled') {
                        actionBtn = `<button class="track-btn" onclick="trackOrder('${order._id}', '${order.deliveryPartnerId._id}', ${order.location.lat}, ${order.location.lng})">Track Live <i class="fa-solid fa-location-crosshairs"></i></button>`;
                    } else {
                        actionBtn = `<a href="contactus.html" class="track-btn" style="background:#888;">Order Details</a>`;
                    }

                    const orderCard = document.createElement('div');
                    orderCard.className = 'order-card';
                    orderCard.innerHTML = `
                        <div class="order-header">
                            <div>Order <b>#${order._id.slice(-8)}</b> | ${date}</div>
                            <div class="order-status status-${order.status.toLowerCase()}">${order.status}</div>
                        </div>
                        <div class="order-body">${itemsHtml}${trackingHtml}${reviewSection}</div>
                        <div class="order-footer">
                            <div class="total-price">Total: <span>₹${order.totalAmount}</span></div>
                            ${actionBtn}
                        </div>
                    `;
                    ordersList.appendChild(orderCard);
                });

            } catch (err) { console.error(err); }
        });
        let activeReviewOrderId = null;
        let selectedRating = 0;

        function openReviewModal(orderId) {
            activeReviewOrderId = orderId;
            selectedRating = 0;
            document.querySelectorAll('#starContainer i').forEach(s => s.classList.remove('active'));
            document.getElementById("reviewComment").value = "";
            document.getElementById("reviewModal").style.display = "block";
        }

        function closeReview() {
            document.getElementById("reviewModal").style.display = "none";
        }

        document.querySelectorAll('#starContainer i').forEach(star => {
            star.onclick = function() {
                selectedRating = parseInt(this.getAttribute('data-val'));
                document.querySelectorAll('#starContainer i').forEach((s, idx) => {
                    if (idx < selectedRating) s.classList.add('active');
                    else s.classList.remove('active');
                });
            };
        });

        async function submitReviewAction() {
            if (selectedRating === 0) {
                alert("Please select a star rating.");
                return;
            }
            const comment = document.getElementById("reviewComment").value;

            try {
                const res = await fetch(`http://localhost:5000/api/order/submit-review/${activeReviewOrderId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rating: selectedRating, comment })
                });

                if (res.ok) {
                    alert("Thank you for your feedback!");
                    location.reload();
                } else {
                    const errorText = await res.text();
                    let errorMessage = "Error submitting review.";
                    try {
                        const errorData = JSON.parse(errorText);
                        errorMessage = errorData.message || errorData.error || errorMessage;
                    } catch (e) {
                        errorMessage = `Server Error (${res.status}): ${errorText.slice(0, 50)}`;
                    }
                    alert(errorMessage);
                }
            } catch (err) { 
                console.error(err); 
                alert("Network Error: Could not connect to the server. Please check if the backend is running.");
            }
        }
    </script>
</body>

</html>

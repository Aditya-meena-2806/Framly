<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="icon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Order History - Farmly</title>
    <style>
        .order-history-container {
            max-width: 1000px;
            margin: 120px auto 50px;
            padding: 20px;
            min-height: 60vh;
        }

        .page-title {
            font-size: 2.5rem;
            color: #2e7d32;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }

        .order-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 25px;
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 1px solid #eee;
        }

        .order-card:hover {
            transform: translateY(-5px);
        }

        .order-header {
            background: #f8f9fa;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-info span {
            color: #666;
            font-size: 0.9rem;
            margin-right: 20px;
        }

        .order-info strong {
            color: #333;
        }

        .order-status {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-shipped { background: #cce5ff; color: #004085; }
        .status-delivered { background: #d4edda; color: #155724; }
        .status-cancelled { background: #f8d7da; color: #721c24; }

        .order-body {
            padding: 20px 25px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .item-details h4 {
            margin: 0;
            color: #333;
            font-size: 1.1rem;
        }

        .item-details p {
            margin: 5px 0 0;
            color: #777;
            font-size: 0.9rem;
        }

        .item-price {
            font-weight: 700;
            color: #2e7d32;
        }

        .order-footer {
            padding: 15px 25px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dotted #eee;
        }

        .total-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #333;
        }

        .total-price span {
            color: #2e7d32;
        }

        .track-btn {
            background: #2e7d32;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .track-btn:hover {
            background: #1b5e20;
        }

        .empty-history {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .empty-history i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #ddd;
        }

        /* Tracking Timeline modal simulation */
        .tracking-timeline {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            position: relative;
        }

        .tracking-timeline::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 5%;
            right: 5%;
            height: 2px;
            background: #ddd;
            z-index: 1;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            width: 20%;
            text-align: center;
        }

        .step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ddd;
            margin-bottom: 8px;
            border: 3px solid white;
        }

        .step.active .step-icon {
            background: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.2);
        }

        .step.completed .step-icon {
            background: #2e7d32;
        }

        .step p {
            font-size: 0.75rem;
            margin: 0;
            font-weight: 600;
            color: #999;
        }

        .step.active p, .step.completed p {
            color: #2e7d32;
        }

        @media (max-width: 600px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .tracking-timeline {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>

    <div class="order-history-container">
        <h1 class="page-title">My Order History</h1>
        <div id="orders-list">
            <div class="empty-history">
                <i class="fa-solid fa-box-open"></i>
                <p>Loading your orders...</p>
            </div>
        </div>
    </div>

    <!-- footer section -->
    <div id="footer">
        <footer>
            <p>&copy; 2025 Farmly All rights reserved</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('customerId');
            const ordersList = document.getElementById('orders-list');

            if (!userId) {
                ordersList.innerHTML = `
                    <div class="empty-history">
                        <i class="fa-solid fa-user-slash"></i>
                        <p>Please <a href="login.html">Login</a> to view your order history.</p>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`http://localhost:5000/api/order/user/${userId}`);
                const orders = await response.json();

                if (orders.length === 0) {
                    ordersList.innerHTML = `
                        <div class="empty-history">
                            <i class="fa-solid fa-calendar-xmark"></i>
                            <p>You haven't placed any orders yet.</p>
                        </div>
                    `;
                    return;
                }

                ordersList.innerHTML = ''; // Clear loading state

                orders.forEach(order => {
                    const statusClass = `status-${order.status.toLowerCase()}`;
                    const date = new Date(order.createdAt).toLocaleDateString(undefined, {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });

                    const itemsHtml = order.items.map(item => `
                        <div class="order-item">
                            <div class="item-details">
                                <h4>${item.name}</h4>
                                <p>Quantity: ${item.quantity}</p>
                            </div>
                            <div class="item-price">₹${item.price * item.quantity}</div>
                        </div>
                    `).join('');

                    // Live Tracking logic (Simplified)
                    let trackingHtml = '';
                    if (order.status !== 'Cancelled') {
                        const steps = ['Pending', 'Shipped', 'Out for Delivery', 'Delivered'];
                        const currentIdx = steps.indexOf(order.status);
                        
                        trackingHtml = `
                            <div class="tracking-timeline">
                                ${steps.map((step, idx) => `
                                    <div class="step ${idx <= currentIdx ? 'completed' : ''} ${idx === currentIdx ? 'active' : ''}">
                                        <div class="step-icon"></div>
                                        <p>${step}</p>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    const orderCard = document.createElement('div');
                    orderCard.className = 'order-card';
                    orderCard.innerHTML = `
                        <div class="order-header">
                            <div class="order-info">
                                <span>Order ID: <strong>#${order._id.substring(order._id.length - 8)}</strong></span>
                                <span>Placed on: <strong>${date}</strong></span>
                            </div>
                            <div class="order-status ${statusClass}">${order.status}</div>
                        </div>
                        <div class="order-body">
                            ${itemsHtml}
                            ${trackingHtml}
                        </div>
                        <div class="order-footer">
                            <div class="total-price">Total Amount: <span>₹${order.totalAmount}</span></div>
                            <a href="contactus.html" class="track-btn">Need Help?</a>
                        </div>
                    `;
                    ordersList.appendChild(orderCard);
                });

            } catch (err) {
                console.error(err);
                ordersList.innerHTML = `
                    <div class="empty-history">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <p>Error loading orders. Please try again later.</p>
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
